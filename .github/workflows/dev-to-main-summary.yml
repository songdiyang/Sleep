name: Dev to Main Feature Summary

on:
  pull_request:
    types: [opened]
    branches: [main]

jobs:
  summarize-features:
    if: github.head_ref == 'dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Collect all features from dev
        id: collect
        run: |
          echo "## 📋 dev 分支特性汇总" > /tmp/feature_summary.md
          echo "" >> /tmp/feature_summary.md
          echo "本次合并包含以下 PR 的特性：" >> /tmp/feature_summary.md
          echo "" >> /tmp/feature_summary.md
          
          if [ -d .github/features ]; then
            FEATURE_FILES=$(ls -1 .github/features/*.md 2>/dev/null | sort)
            if [ -n "$FEATURE_FILES" ]; then
              echo "$FEATURE_FILES" | while read file; do
                PR_NUM=$(echo "$file" | grep -oE 'PR[0-9]+' | sed 's/PR//')
                echo "### PR #$PR_NUM" >> /tmp/feature_summary.md
                cat "$file" >> /tmp/feature_summary.md
                echo "" >> /tmp/feature_summary.md
              done
              
              FEATURE_COUNT=$(echo "$FEATURE_FILES" | wc -l)
              echo "total=$FEATURE_COUNT" >> $GITHUB_OUTPUT
            else
              echo "暂无特性记录" >> /tmp/feature_summary.md
              echo "total=0" >> $GITHUB_OUTPUT
            fi
          else
            echo "暂无特性记录" >> /tmp/feature_summary.md
            echo "total=0" >> $GITHUB_OUTPUT
          fi
          
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/feature_summary.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update PR description
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.collect.outputs.summary }}`;
            const total = `${{ steps.collect.outputs.total }}`;
            
            // 获取当前 PR 描述
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            // 在 PR 描述前添加特性汇总
            const newBody = `${summary}\n\n---\n\n${pr.body}`;
            
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: newBody
            });
            
            // 添加评论
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📝 已自动汇总 dev 分支的 ${total} 个特性记录到 PR 描述中。`
            });
